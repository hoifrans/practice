
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francis Carl's Page</title>

<style>

body{
margin:0;
font-family:'Trebuchet MS', sans-serif;
background: radial-gradient(circle at top,#2b0040,#0b0014);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* glowing particles background */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle,#a855ff22 1px,transparent 1px);
background-size:40px 40px;
animation:movebg 20s linear infinite;
z-index:-1;
}

@keyframes movebg{
0%{transform:translateY(0);}
100%{transform:translateY(-200px);}
}

.main{
text-align:center;
width:90%;
max-width:900px;
}

/* TOP PHOTO */

.top-photo img{
width:200px;
height:200px;
border-radius:25px;
border:3px solid #c084fc;
box-shadow:
0 0 20px #a855ff,
0 0 40px #7e22ce;
object-fit:cover;
}

/* CARDS */

.cards{
margin-top:40px;
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
}

.card{
width:150px;
height:200px;
perspective:1000px;
cursor:pointer;
}

.inner{
width:100%;
height:100%;
position:relative;
transition:transform 0.8s;
transform-style:preserve-3d;
}

.card.flip .inner{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
background:#120020;
border-radius:18px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
box-shadow:
0 0 15px #9333ea,
0 0 35px #6b21a8;
}

.back{
transform:rotateY(180deg);
}

.card img{
width:100px;
height:100px;
border-radius:12px;
object-fit:cover;
border:2px solid #c084fc;
box-shadow:0 0 10px #a855ff;
}

.card p{
margin-top:10px;
font-weight:bold;
font-size:16px;
color:#e9d5ff;
}

/* LINKS */

.links{
margin-top:45px;
display:flex;
flex-direction:column;
gap:15px;
align-items:center;
}

.link{
width:280px;
padding:15px;
border-radius:15px;
text-decoration:none;
font-weight:bold;
color:#f3e8ff;
background:#1a002b;
border:1px solid #9333ea;
box-shadow:
0 0 10px #7e22ce;
transition:0.3s;
}

.link:hover{
transform:scale(1.08);
box-shadow:
0 0 20px #a855ff,
0 0 40px #7e22ce;
background:#22003a;
}

/* MOBILE */

@media(max-width:600px){

.cards{
gap:15px;
}

.card{
width:130px;
height:180px;
}

.link{
width:90%;
}

}

</style>
</head>


<body>

<div class="main">

<!-- TOP PHOTO -->
<div class="top-photo">
<img src="fransis.jpeg">
</div>


<!-- PHOTO CARDS -->

<div class="cards">

<div class="card">
<div class="inner">

<div class="front">
<img src="frans1.jpeg">
<p>Frans 1</p>
</div>

<div class="back">
<img src="frans1.jpeg">
<p>Frans 1</p>
</div>

</div>
</div>


<div class="card">
<div class="inner">

<div class="front">
<img src="frans2.jpeg">
<p>Frans 2</p>
</div>

<div class="back">
<img src="frans2.jpeg">
<p>Frans 2</p>
</div>

</div>
</div>


<div class="card">
<div class="inner">

<div class="front">
<img src="frans3.jpeg">
<p>Frans 3</p>
</div>

<div class="back">
<img src="frans3.jpeg">
<p>Frans 3</p>
</div>

</div>
</div>


<div class="card">
<div class="inner">

<div class="front">
<img src="frans4.jpeg">
<p>Frans 4</p>
</div>

<div class="back">
<img src="frans4.jpeg">
<p>Frans 4</p>
</div>

</div>
</div>

</div>


<!-- LINK BOXES -->

<div class="links">

<a class="link" href="https://example.com" target="_blank">
My Portfolio
</a>

<a class="link" href="https://youtube.com" target="_blank">
My YouTube Channel
</a>

<a class="link" href="https://instagram.com" target="_blank">
Instagram
</a>

<a class="link" href="https://github.com" target="_blank">
GitHub
</a>

</div>

</div>


<script>

/* CARD FLIP */

document.querySelectorAll(".card").forEach(card=>{
card.addEventListener("click",()=>{
card.classList.toggle("flip");
});
});

</script>

</body>
</html>
